<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipta E-Kad Raya Anda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f8f5f0; font-family: 'Lora', serif; }
    .ekad-form { max-width: 420px; margin: 2.5rem auto; background: #fff; border-radius: 1.2rem; box-shadow: 0 4px 24px 0 rgba(27,67,50,0.10); border: 2px solid #cfb53b; padding: 2rem 1.2rem; }
    .theme-sample { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .theme-box { width: 48px; height: 48px; border-radius: 0.7rem; border: 2px solid #cfb53b; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border 0.2s; }
    .theme-box.selected { border: 3px solid #1b4332; }
    .theme1 { background: #f8f5f0; }
    .theme2 { background: #e0f7fa; }
    .theme3 { background: #fffbe6; }
    .preview-img { width: 100%; max-width: 180px; border-radius: 1rem; border: 2px solid #cfb53b; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="ekad-form">
    <h2 class="mb-3" style="font-family:'Great Vibes',cursive;color:#1b4332;text-align:center;">Cipta E-Kad Raya Anda</h2>
    <form id="ekadForm" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label" style="color:#1b4332;font-weight:bold;">Pilih Tema:</label>
        <div class="theme-sample">
          <div class="theme-box theme1 selected" data-theme="theme1"></div>
          <div class="theme-box theme2" data-theme="theme2"></div>
          <div class="theme-box theme3" data-theme="theme3"></div>
        </div>
        <input type="hidden" name="theme" id="themeInput" value="theme1">
      </div>
      <div class="mb-3">
        <label class="form-label" style="color:#1b4332;font-weight:bold;">Muat Naik Foto Keluarga:</label>
        <input type="file" class="form-control" name="photo" id="photoInput" accept="image/*" required>
        <img id="previewImg" class="preview-img d-none" alt="Preview">
      </div>
      <div class="mb-3">
        <label class="form-label" style="color:#1b4332;font-weight:bold;">Ucapan Raya:</label>
        <textarea class="form-control" name="wish" id="wishInput" rows="2" maxlength="200" required placeholder="Contoh: Selamat Hari Raya! Maaf zahir & batin."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" style="color:#1b4332;font-weight:bold;">Nama Keluarga:</label>
        <input type="text" class="form-control" name="signature" id="signatureInput" maxlength="100" required placeholder="Contoh: Ahmad, Aminah & Anak-anak">
      </div>
      <button type="submit" class="btn btn-success w-100" style="background:#1b4332;border:none;">Cipta Kad</button>
    </form>
    <div id="result" class="mt-3"></div>
  </div>
  <script>
    // Theme selection
    document.querySelectorAll('.theme-box').forEach(function(box) {
      box.addEventListener('click', function() {
        document.querySelectorAll('.theme-box').forEach(b=>b.classList.remove('selected'));
        box.classList.add('selected');
        document.getElementById('themeInput').value = box.getAttribute('data-theme');
      });
    });
    // Image preview
    document.getElementById('photoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = document.getElementById('previewImg');
          img.src = ev.target.result;
          img.classList.remove('d-none');
        };
        reader.readAsDataURL(file);
      }
    });
    // Form submit
    document.getElementById('ekadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      fetch('create_kad.php', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          const cardUrl = window.location.origin + '/' + data.url;
          document.getElementById('result').innerHTML =
            '<div class="alert alert-success">Kad berjaya dicipta! <a href="' + data.url + '" target="_blank">Lihat Kad Anda</a></div>' +
            '<div class="text-center mt-3">' +
              '<img src="qr.png" alt="QR Sokongan" style="width:160px;height:160px;border-radius:1rem;border:2px solid #cfb53b;box-shadow:0 2px 8px #cfb53b33;">' +
              '<div class="mt-2" style="color:#1b4332;font-weight:bold;">Sokong usaha kami membina platform kad digital ini. Terima kasih!<br><span style="color:#cfb53b;font-weight:normal;">RM10 pun boleh 😊</span></div>' +
            '</div>';
        } else {
          document.getElementById('result').innerHTML = '<div class="alert alert-danger">' + (data.error || 'Ralat!') + '</div>';
        }
      })
      .catch(()=>{
        document.getElementById('result').innerHTML = '<div class="alert alert-danger">Ralat rangkaian!</div>';
      });
    });
    // Simple QR code generator (no external library)
    function generateQR(text) {
      const canvas = document.getElementById('qrCanvas');
      if (!canvas) return;
      // Use Google Chart API for QR (quick, no dependency)
      const size = 160;
      const img = new Image();
      img.src = 'https://chart.googleapis.com/chart?cht=qr&chs=' + size + 'x' + size + '&chl=' + encodeURIComponent(text);
      img.onload = function() {
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
      };
    }
  </script>
</body>
</html>
