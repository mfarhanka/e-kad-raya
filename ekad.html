<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Hari Raya Aidilfitri - E-Kad</title>
  <!-- Bootstrap 5.3 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #f8f5f0 url('data:image/svg+xml;utf8,<svg width="100%25" height="100%25" xmlns="http://www.w3.org/2000/svg"><rect width="100%25" height="100%25" fill="%23f8f5f0"/><pattern id="songket" patternUnits="userSpaceOnUse" width="40" height="40"><rect x="0" y="0" width="40" height="40" fill="none"/><path d="M20 0 L40 20 L20 40 L0 20 Z" fill="none" stroke="%23cfb53b" stroke-width="1" opacity="0.08"/></pattern><rect width="100%25" height="100%25" fill="url(%23songket)"/></svg>');
      font-family: 'Lora', serif;
      margin: 0;
    }
    .ekad-card {
      background: rgba(255,255,255,0.92);
      border-radius: 2rem;
      box-shadow: 0 8px 32px 0 rgba(27,67,50,0.12);
      padding: 2rem 1.2rem 1.5rem 1.2rem;
      max-width: 400px;
      width: 100%;
      border: 3px solid #cfb53b;
      position: relative;
      overflow: hidden;
      margin: 2.5rem auto 1.5rem auto;
    }
    .greeting {
      font-family: 'Great Vibes', cursive;
      color: #1b4332;
      font-size: 2.1rem;
      text-align: center;
      margin-bottom: 0.2rem;
      animation: fadeInDown 1.2s ease;
    }
    .sub-greeting {
      font-size: 1.1rem;
      color: #cfb53b;
      text-align: center;
      font-family: 'Lora', serif;
      margin-bottom: 1.2rem;
      animation: fadeIn 2s 0.5s both;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .family-photo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.2rem;
    }
    .family-photo img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 1.2rem;
      border: 5px solid #cfb53b;
      box-shadow: 0 4px 16px 0 rgba(207,181,59,0.12);
      background: #fff;
    }
    .message-box {
      background: rgba(27,67,50,0.08);
      border-radius: 1rem;
      padding: 1.1rem 1rem 1rem 1rem;
      margin-bottom: 1.1rem;
      position: relative;
      text-align: center;
      font-size: 1.05rem;
      color: #1b4332;
      font-family: 'Lora', serif;
      box-shadow: 0 2px 8px 0 rgba(27,67,50,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
    }
    .message-icon {
      width: 32px;
      height: 32px;
      opacity: 0.85;
    }
    .signature {
      text-align: center;
      font-size: 1rem;
      color: #1b4332;
      margin-bottom: 0.7rem;
      font-family: 'Lora', serif;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 0.2rem;
    }
    .social svg {
      width: 26px;
      height: 26px;
      fill: #cfb53b;
      transition: fill 0.2s;
      cursor: pointer;
    }
    .social svg:hover {
      fill: #1b4332;
    }
    .share-btn {
      display: inline-block;
      background: #cfb53b;
      color: #fff;
      border: none;
      border-radius: 1.2rem;
      padding: 0.4rem 1.1rem;
      font-size: 0.98rem;
      font-family: 'Lora', serif;
      margin-top: 0.2rem;
      box-shadow: 0 2px 8px 0 rgba(207,181,59,0.10);
      transition: background 0.2s;
    }
    .share-btn:hover {
      background: #1b4332;
      color: #fff;
    }
    @media (max-width: 600px) {
      body {
        display: block !important;
        height: auto !important;
      }
      .ekad-card {
        padding: 1.1rem 0.2rem 1rem 0.2rem;
        max-width: 100vw;
        border-radius: 1.1rem;
        margin: 1.2rem 0.2rem 1.2rem 0.2rem;
      }
      .family-photo img {
        width: 98vw;
        max-width: 170px;
        height: 170px;
      }
      .container, .container-fluid {
        padding-left: 0.2rem !important;
        padding-right: 0.2rem !important;
      }
      .w-100[style*="max-width:400px"] {
        max-width: 100vw !important;
        padding: 0 0.2rem;
      }
      #wishForm, #wishDisplay, #allWishes {
        padding-left: 0.2rem !important;
        padding-right: 0.2rem !important;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="ekad-card w-100">
      <!-- Greeting Section -->
      <div class="greeting">Selamat Hari Raya Aidilfitri</div>
      <div class="sub-greeting">Maaf Zahir &amp; Batin</div>
      <!-- Family Photo -->
      <div class="family-photo">
        <img src="photo.png" alt="Family Photo" loading="lazy">
      </div>
      <!-- Message Box with SVG icons -->
      <div class="message-box">
        <!-- Left Icon -->
        <span class="message-icon">
          <!-- Lantern SVG -->
          <svg viewBox="0 0 32 32" fill="none"><ellipse cx="16" cy="14" rx="10" ry="14" stroke="#cfb53b" stroke-width="2" fill="#fffbe6"/><rect x="13" y="2" width="6" height="4" rx="2" fill="#cfb53b"/><rect x="15" y="0" width="2" height="4" rx="1" fill="#1b4332"/><rect x="15" y="28" width="2" height="4" rx="1" fill="#1b4332"/></svg>
        </span>
        <span style="flex:1;">
          Tulus ikhlas daripada kami sekeluarga, semoga Aidilfitri ini membawa keberkatan, kebahagiaan dan kemaafan buat semua.
        </span>
        <!-- Right Icon -->
        <span class="message-icon">
          <!-- Pelita SVG -->
          <svg viewBox="0 0 32 32" fill="none"><ellipse cx="16" cy="22" rx="10" ry="6" stroke="#cfb53b" stroke-width="2" fill="#fffbe6"/><rect x="13" y="8" width="6" height="14" rx="3" fill="#cfb53b"/><path d="M16 2 Q18 6 16 8 Q14 6 16 2 Z" fill="#1b4332"/></svg>
        </span>
      </div>
      <!-- Signature Section -->
      <div class="signature">Daripada: Ahmad, Aminah &amp; Anak-anak</div>
      <div class="social">
        <!-- Facebook -->
        <a href="#" title="Facebook" aria-label="Facebook">
          <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#fffbe6"/><path d="M20.5 16H18V25H15V16H13.5V13.5H15V12.25C15 10.18 16.18 9 18.01 9H20.5V11.5H19.25C18.56 11.5 18 11.56 18 12.25V13.5H20.5V16Z" fill="#cfb53b"/></svg>
        </a>
        <!-- Instagram -->
        <a href="#" title="Instagram" aria-label="Instagram">
          <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#fffbe6"/><rect x="10" y="10" width="12" height="12" rx="4" fill="#cfb53b"/><circle cx="16" cy="16" r="3" fill="#fffbe6"/><circle cx="21" cy="11" r="1" fill="#1b4332"/></svg>
        </a>
        <!-- WhatsApp -->
        <a href="#" title="WhatsApp" aria-label="WhatsApp">
          <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#fffbe6"/><path d="M23 21.5c-1.1.5-2.3.8-3.5.8-3.9 0-7-3.1-7-7 0-1.2.3-2.4.8-3.5l-2.3-2.3c-.2-.2-.2-.5 0-.7l2.3-2.3c.2-.2.5-.2.7 0l2.3 2.3c1.1-.5 2.3-.8 3.5-.8 3.9 0 7 3.1 7 7 0 1.2-.3 2.4-.8 3.5l2.3 2.3c.2.2.2.5 0 .7l-2.3 2.3c-.2.2-.5.2-.7 0l-2.3-2.3z" fill="#cfb53b"/></svg>
        </a>
      </div>
      <div class="d-flex justify-content-center">
        <button class="share-btn" onclick="shareCard()">Kongsi</button>
      </div>
    </div>
  </div>
  <!-- Comment Box Section -->
  <div class="container d-flex justify-content-center mt-3 mb-4">
    <div class="w-100" style="max-width:400px;">
      <form id="wishForm" class="bg-white p-3 rounded shadow-sm" style="border:1px solid #cfb53b;">
        <label for="wishInput" class="form-label" style="color:#1b4332;font-weight:bold;">Tinggalkan Ucapan Anda:</label>
        <textarea class="form-control mb-2" id="wishInput" rows="2" maxlength="200" placeholder="Contoh: Selamat Hari Raya! Maaf zahir & batin."></textarea>
        <button type="submit" class="btn btn-success w-100" style="background:#1b4332;border:none;">Hantar Ucapan</button>
      </form>
      <div id="wishDisplay" class="mt-3" style="display:none;">
        <div class="alert alert-success" role="alert" style="background:#fffbe6;border:1px solid #cfb53b;color:#1b4332;">
          <strong>Ucapan anda:</strong>
          <div id="wishMessage" style="margin-top:0.5rem;"></div>
        </div>
      </div>
      <div id="allWishes" class="mt-4"></div>
    </div>
  </div>
  <script>
    // Soft float animation for card
    document.querySelector('.ekad-card').animate([
      { transform: 'translateY(10px)' },
      { transform: 'translateY(-10px)' },
      { transform: 'translateY(10px)' }
    ], {
      duration: 4200,
      iterations: Infinity,
      direction: 'alternate',
      easing: 'ease-in-out'
    });
    // Share button functionality
    function shareCard() {
      if (navigator.share) {
        navigator.share({
          title: 'Selamat Hari Raya Aidilfitri',
          text: 'Salam Aidilfitri dari kami sekeluarga!',
          url: window.location.href
        });
      } else {
        alert('Kongsi pautan ini: ' + window.location.href);
      }
    }
    // Comment box logic with backend JSON storage
    function renderAllWishes(wishes) {
      var allWishesDiv = document.getElementById('allWishes');
      if (!wishes || wishes.length === 0) {
        allWishesDiv.innerHTML = '';
        return;
      }
      let html = '<div class="bg-white rounded shadow-sm p-2" style="border:1px solid #cfb53b;">';
      html += '<div style="color:#1b4332;font-weight:bold;margin-bottom:0.5rem;">Ucapan yang telah diterima:</div>';
      wishes.slice().reverse().forEach(function(w) {
        html += '<div class="mb-2" style="border-bottom:1px dashed #cfb53b;padding-bottom:0.3rem;">';
        html += '<span style="color:#1b4332;">' + w.wish + '</span>';
        html += '<div style="font-size:0.8em;color:#888;">' + w.time + '</div>';
        html += '</div>';
      });
      html += '</div>';
      allWishesDiv.innerHTML = html;
    }

    function loadWishes() {
      fetch('save_wish.php')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            renderAllWishes(data.wishes);
          }
        });
    }

    document.getElementById('wishForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var wish = document.getElementById('wishInput').value.trim();
      if (wish.length > 0) {
        fetch('save_wish.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wish: wish })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            document.getElementById('wishMessage').textContent = wish;
            document.getElementById('wishDisplay').style.display = 'block';
            document.getElementById('wishForm').reset();
            renderAllWishes(data.wishes);
          } else {
            document.getElementById('wishMessage').textContent = '';
            document.getElementById('wishDisplay').style.display = 'none';
          }
        });
      } else {
        document.getElementById('wishMessage').textContent = '';
        document.getElementById('wishDisplay').style.display = 'none';
      }
    });

    // Load wishes on page load
    loadWishes();
  </script>
</body>
</html>
